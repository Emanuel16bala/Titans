<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilul Meu | Titan Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <nav class="glass fade-in">
        <a href="/" class="logo">Titan <span>Shop</span></a>
        <div class="nav-links">
            <a href="/">Acasă</a>
            {% if session.get('role') == 'admin' %}<a href="/admin">Admin Hub</a>{% endif %}
            <a href="/logout">Logout</a>
        </div>
    </nav>

    <div class="auth-container" style="padding-top: 140px; align-items: flex-start; min-height: auto; padding-bottom: 100px;">
        <div class="glass auth-card fade-in" style="max-width: 950px; text-align: left; padding: 50px; display: grid; grid-template-columns: 1fr 2fr; gap: 50px;">
            <!-- LEFT: INFO -->
            <div style="border-right: 1px solid var(--glass-border); padding-right: 50px;">
                <div style="width: 100px; height: 100px; background: var(--accent-pink); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: var(--neon-shadow);">
                    <i class="fas fa-user" style="font-size: 40px; color: white;"></i>
                </div>
                <h2 style="margin-bottom: 10px;">{{ user.username }}</h2>
                <p style="color: var(--accent-pink); font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 25px;">
                    <i class="fas fa-shield-halved"></i> {{ user.role }} (G{{ user.grade or 0 }})
                </p>
                
                <div class="glass" style="padding: 20px; border-radius: 15px; font-size: 12px; color: var(--text-gray);">
                    <i class="fas fa-envelope"></i> {{ user.email or 'fără email configurat' }}
                </div>
                
                <button onclick="location.href='/orders'" class="btn-neon" style="width: 100%; margin-top: 30px; font-size: 12px;">VEZI COMENZILE MELE</button>
            </div>

            <!-- RIGHT: EDIT -->
            <div>
                <h3 style="margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 15px;">Setări Securitate & Cont</h3>
                <form action="/profile/update" method="POST">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px;">
                        <div class="input-group">
                            <label>Adresă Email</label>
                            <input type="email" name="email" value="{{ user.email or '' }}" style="color: white; border-color: rgba(255,255,255,0.1);">
                        </div>
                        <div class="input-group">
                            <label>Username (Nu se poate schimba)</label>
                            <input type="text" value="{{ user.username }}" disabled style="opacity: 0.5;">
                        </div>
                    </div>
                    
                    <div class="input-group" style="margin-bottom: 30px;">
                        <label>Parolă Nouă (Lasă gol pentru a păstra actuala)</label>
                        <input type="password" name="new_password" placeholder="••••••••" style="color: white; border-color: rgba(255,255,255,0.1);">
                    </div>

                    <button type="submit" class="btn-neon" style="width: 100%; padding: 20px;">Salvează Modificările Permanente</button>
                </form>
            </div>
        </div>
    </div>

    <footer style="margin-top: 50px;">
        <div class="footer-content" style="text-align: right;">
             <div class="footer-column" style="align-items: flex-end;">
                 <a href="/" class="logo">Titan <span>Shop</span></a>
                 <p style="font-size: 11px; color: #555;">© 2026 Resurse Digitale Premium</p>
             </div>
        </div>
    </footer>
</body>
</html>
