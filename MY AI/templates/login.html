<!DOCTYPE html>
<html lang="ro">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Titan Shop</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div class="bg-vignette"></div>

    <div class="auth-container">
        <div class="glass auth-card fade-in" style="max-width: 450px;">
            <a href="/" class="logo" style="justify-content: center; margin-bottom: 40px; font-size: 32px;">
                <i class="fas fa-bolt"></i> Titan <span>Shop</span>
            </a>

            {% if error %}
            <div class="glass" style="color: #ff2d95; padding: 15px; margin-bottom: 25px; font-size: 14px; border-color: var(--accent-pink);">
                <i class="fas fa-circle-exclamation"></i> {{ error }}
            </div>
            {% endif %}

            <div id="login-form">
                <h3 style="margin-bottom: 25px; font-size: 24px;">Cont Client</h3>
                <form action="/login" method="POST">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <input type="text" name="username" required placeholder="Utilizator">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-key"></i> Parolă</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-neon">
                        <i class="fas fa-right-to-bracket"></i> Intră în cont
                    </button>
                    <p style="margin-top: 25px; font-size: 14px; color: var(--text-gray);">
                        Nu ai cont încă? <a href="#" onclick="toggleAuth()" style="color: var(--accent-pink); font-weight: 600; text-decoration: none;">Înregistrează-te</a>
                    </p>
                </form>
            </div>

            <div id="register-form" style="display: none;">
                <h3 style="margin-bottom: 25px; font-size: 24px;">Creează Cont</h3>
                <form action="/register" method="POST">
                    <div class="input-group">
                        <label><i class="fas fa-user"></i> Username</label>
                        <input type="text" name="username" required placeholder="Utilizator">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-key"></i> Parolă</label>
                        <input type="password" name="password" required placeholder="••••••••">
                    </div>
                    <div class="input-group">
                        <label><i class="fas fa-user-shield"></i> Tip Cont</label>
                        <select name="role" id="role-select" onchange="showAdminSecret()" class="glass" style="width: 100%; padding: 12px; border: 1px solid var(--glass-border); border-radius: 10px; background: rgba(0,0,0,0.3); color: white;">
                            <option value="client">Client (Standard)</option>
                            <option value="admin">Administrator (Staff)</option>
                        </select>
                    </div>
                    <div class="input-group" id="admin-secret-group" style="display: none;">
                        <label><i class="fas fa-lock"></i> Admin Secret Key</label>
                        <input type="password" name="secret_admin_pass" placeholder="Cheie secretă de securitate">
                    </div>
                    <button type="submit" class="btn-neon">
                        <i class="fas fa-user-plus"></i> Finalizează Înregistrarea
                    </button>
                    <p style="margin-top: 25px; font-size: 14px; color: var(--text-gray);">
                        Ai deja cont? <a href="#" onclick="toggleAuth()" style="color: var(--accent-pink); font-weight: 600; text-decoration: none;">Login</a>
                    </p>
                </form>
            </div>
        </div>
    </div>

    <script>
        function toggleAuth() {
            const login = document.getElementById('login-form');
            const register = document.getElementById('register-form');
            if (login.style.display === 'none') {
                login.style.display = 'block';
                register.style.display = 'none';
            } else {
                login.style.display = 'none';
                register.style.display = 'block';
                showAdminSecret();
            }
        }
        function showAdminSecret() {
            const role = document.getElementById('role-select').value;
            const secret = document.getElementById('admin-secret-group');
            secret.style.display = role === 'admin' ? 'block' : 'none';
        }
    </script>
</body>

</html>
